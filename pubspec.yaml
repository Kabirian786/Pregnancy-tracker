name: naheed_pregnancy_care
description: "نہید پریگننسی کیئر - حاملہ خواتین کے لیے مکمل نگہداشت ایپ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Offline storage (no codegen required — pure Map/primitive storage)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Dates
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.68.0

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

  # Sharing / backup
  share_plus: ^9.0.0
  file_picker: ^8.0.6

  # Permissions
  permission_handler: ^11.3.1

  # Emergency call
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
    - asset: assets/fonts/JameelNooriNastaleeq.ttf
